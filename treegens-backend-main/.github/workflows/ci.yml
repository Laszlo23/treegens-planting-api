name: prod-pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  publish:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'
      - name: Increase Yarn network timeout
        run: yarn config set network-timeout 600000 -g
      - name: Install deps
        run: yarn install --frozen-lockfile
      - name: TypeScript build
        run: yarn build
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        id: build_and_push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/generalmagicio/treegens-backend:main
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Redeploy Prod
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            docker system prune -f
            # Authenticate with GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd treegens-backend
            git checkout main
            git fetch origin main
            git reset --hard origin/main
            git pull origin main
            docker compose pull

  rollout-deploy-1:
    needs: deploy
    runs-on: ubuntu-latest
    env:
      SERVICE: 'treegens-be1'
    steps:
      - name: SSH and Redeploy Prod
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: SERVICE
          script: |
            ## Update each backend service one by one
            ## First Deployment
            export SERVICE="${SERVICE}"
            cd treegens-backend

            # Stop and remove the service
            docker compose rm -fs $SERVICE

            # Start the service
            docker compose up --force-recreate -d $SERVICE

            # Get the actual container name(s) for health checking
            CONTAINER_NAME=$(docker compose ps -q $SERVICE | head -1)

            # Wait for container to be healthy (timeout after 5 minutes)
            echo "Waiting for service $SERVICE (container: $CONTAINER_NAME) to become healthy..."
            timeout 300 bash -c 'until [ "$(docker inspect --format="{{json .State.Health.Status}}" '$CONTAINER_NAME')" == "\"healthy\"" ]; do echo "Waiting for '$SERVICE' to be healthy..."; sleep 5; done'
            if [ $? -eq 124 ]; then
                echo "Timeout waiting for $SERVICE to become healthy"
                exit 1
            fi

            # Check if container is healthy
            if [ "$(docker inspect --format='{{json .State.Health.Status}}' $CONTAINER_NAME)" != "\"healthy\"" ]; then
                echo "$SERVICE is not healthy, stopping deployment"
                exit 1
            fi
            echo "First deployment phase completed successfully"

  rollout-deploy-2:
    needs: rollout-deploy-1
    runs-on: ubuntu-latest
    env:
      SERVICE: 'treegens-be2'
    steps:
      - name: SSH and Redeploy Prod
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: SERVICE
          script: |
            ## Update each backend service one by one
            ## Second Deployment
            export SERVICE="${SERVICE}"
            cd treegens-backend

            # Stop and remove the service
            docker compose rm -fs $SERVICE

            # Start the service
            docker compose up --force-recreate -d $SERVICE

            # Get the actual container name(s) for health checking
            CONTAINER_NAME=$(docker compose ps -q $SERVICE | head -1)

            # Wait for container to be healthy (timeout after 5 minutes)
            echo "Waiting for service $SERVICE (container: $CONTAINER_NAME) to become healthy..."
            timeout 300 bash -c 'until [ "$(docker inspect --format="{{json .State.Health.Status}}" '$CONTAINER_NAME')" == "\"healthy\"" ]; do echo "Waiting for '$SERVICE' to be healthy..."; sleep 5; done'
            if [ $? -eq 124 ]; then
                echo "Timeout waiting for $SERVICE to become healthy"
                exit 1
            fi

            # Check if container is healthy
            if [ "$(docker inspect --format='{{json .State.Health.Status}}' $CONTAINER_NAME)" != "\"healthy\"" ]; then
                echo "$SERVICE is not healthy, stopping deployment"
                exit 1
            fi
            echo "Second deployment phase completed successfully"
