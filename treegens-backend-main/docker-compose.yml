services:
  treegens-be1:
    image: ${DOCKER_IMAGE}
    restart: always
    env_file:
      - .env
    environment:
      - ENABLE_CRONJOBS=true
    ports:
      - 5000
    networks:
      - treegens-network
    deploy:
      replicas: 2
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  treegens-be2:
    image: ${DOCKER_IMAGE}
    restart: always
    env_file:
      - .env
    ports:
      - 5000
    networks:
      - treegens-network
    deploy:
      replicas: 2
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: always
    networks:
      - treegens-network
    ports:
      - 80:80
      - 443:443
    env_file:
      - .env
    environment:
      - BACKEND_URL=${BACKEND_URL:-}
      - IP_WHITELIST=${IP_WHITELIST:-0.0.0.0/0}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile

networks:
  treegens-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
